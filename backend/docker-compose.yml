services:
  db:
    image: postgres:16
    container_name: ticketflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticketflow
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: node:24-alpine
    container_name: ticketflow-api
    working_dir: /app
    command: sh -c "npm install && npm run prisma:generate && npm run prisma:deploy && npm run start"
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://ticket_user:ticket_pass@db:5432/ticketflow?schema=public
      JWT_SECRET: change-this-in-vps
      JWT_EXPIRES_IN: 7d
      UPLOAD_DIR: /app/uploads
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      - db

volumes:
  pgdata:
